<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BMW M SERIES | Ultimate Configurator & Game</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root {
    --bg:#000; 
    --text:#fff; 
    --card:#111; 
    --primary:#0d47a1; 
    --secondary:#ffcc00;
    --accent:#ff5733;
}
* {margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body {background:var(--bg);color:var(--text);overflow-x:hidden;transition:0.5s;}
button {cursor:pointer;}

/* LOGIN PANEL */
#loginPanel{
    background:#111;padding:40px;border-radius:25px;width:400px;margin:100px auto;text-align:center;box-shadow:0 0 30px rgba(0,0,0,0.8);
    animation: fadeIn 1s forwards;
}
#loginPanel h2 {margin-bottom:20px;font-size:28px;}
#loginPanel input{display:block;width:100%;padding:15px;margin:10px 0;border-radius:12px;border:none;font-size:16px;}
#loginPanel button{padding:15px 30px;border:none;border-radius:25px;background:var(--primary);color:#fff;cursor:pointer;margin-top:10px;font-size:16px;transition:0.3s;}
#loginPanel button:hover{background:var(--secondary);color:#000;}

/* HERO SECTION */
.hero {
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.9)), url('https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg') center/cover no-repeat;
    text-align:center;
    padding:150px 20px;
    opacity:0;
}
.hero h1{font-size:60px;letter-spacing:4px;margin-bottom:20px;opacity:0;}
.hero p{font-size:20px;margin-bottom:40px;opacity:0;}
.hero button{padding:15px 40px;font-size:18px;border:none;border-radius:30px;background:var(--primary);color:#fff;opacity:0;transition:0.3s;}
.hero button:hover{background:var(--secondary);color:#000;}

/* MODELS CARDS */
.models{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    margin:60px 0;
}
.card{
    background:var(--card);
    padding:20px;
    margin:20px;
    border-radius:25px;
    box-shadow:0 15px 50px rgba(0,0,0,0.7);
    transition:0.5s;
    width:240px;
    cursor:pointer;
    overflow:hidden;
    position:relative;
}
.card img{width:100%;border-radius:20px;transition:0.5s;}
.card:hover img{transform:scale(1.1);}
.card h3{margin-top:15px;text-align:center;font-size:18px;color:#fff;}
.card .card-overlay{
    position:absolute;
    top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    opacity:0;transition:0.5s;border-radius:25px;
}
.card:hover .card-overlay{opacity:1;}

/* STORY PANEL */
.story-panel{
    position:fixed;
    top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    z-index:1001;
    padding:30px;
    overflow-y:auto;
}
.story-panel.active{display:flex;}
.story-panel img{max-width:450px;border-radius:25px;margin-bottom:25px;}
.story-panel h2{font-size:40px;margin-bottom:15px;}
.story-panel p{font-size:18px;line-height:1.6;margin-bottom:25px;max-width:700px;text-align:left;}
.story-panel button{padding:15px 30px;border:none;border-radius:25px;background:var(--primary);color:#fff;cursor:pointer;margin:10px;transition:0.3s;}
.story-panel button:hover{background:var(--secondary);color:#000;}

/* START GAME BUTTON */
#startGameBtn{
    display:block;
    margin:50px auto;
    padding:20px 50px;
    font-size:22px;
    border:none;
    border-radius:30px;
    background:var(--primary);
    color:#fff;
    cursor:pointer;
    transition:0.3s;
    opacity:0;
}
#startGameBtn:hover{background:var(--secondary);color:#000;}

/* GAME PANEL */
#gamePanel{
    display:none;
    margin:50px auto;
    max-width:1000px;
    padding:40px;
    background:#222;
    border-radius:25px;
    color:#fff;
    text-align:center;
}
#coinsDisplay{
    position:fixed;
    top:20px;
    right:30px;
    font-size:20px;
    background:#222;
    padding:15px 20px;
    border-radius:20px;
    display:none;
}

/* FOOTER */
footer{color:#888;text-align:center;margin:60px 0 20px;font-size:16px;opacity:0;}

/* ANIMATIONS */
@keyframes fadeIn{0%{opacity:0;}100%{opacity:1;}}
</style>
</head>
<body>

<!-- LOGIN PANEL -->
<div id="loginPanel">
    <h2>Welcome to BMW M SERIES</h2>
    <input type="text" id="username" placeholder="Enter your name">
    <button onclick="login()">Login</button>
</div>

<!-- HERO SECTION -->
<div id="mainContent" style="display:none;">
    <div class="hero" id="heroSection">
        <h1>BMW M SERIES | Ultimate Configurator</h1>
        <p>Explore and customize your dream BMW interactively!</p>
        <button>Explore Models</button>
        <div class="models" id="modelsContainer">
            <!-- We'll generate multiple cards dynamically to make it huge -->
        </div>
    </div>

    <!-- START GAME BUTTON -->
    <button id="startGameBtn" onclick="startGame()">Start Game</button>

    <!-- GAME PANEL -->
    <div id="gamePanel">
        <h2>Dream Car Game Panel</h2>
        <p>Here goes your coins, progress, and interactions.</p>
        <div id="coinsDisplay">Coins: 0</div>
        <!-- You can inject your original dream car game code here -->
    </div>
</div>

<footer>Created professionally by Sunveer</footer>

<script>
// Persistent login
window.onload = function(){
    const savedUser = localStorage.getItem('bmwUser');
    if(savedUser){
        document.getElementById('loginPanel').style.display='none';
        document.getElementById('mainContent').style.display='block';
        animateHero();
        showStartButton();
    } else {
        document.getElementById('loginPanel').style.display='block';
    }
}

// Login function
function login(){
    const username = document.getElementById('username').value.trim();
    if(username){
        localStorage.setItem('bmwUser', username);
        document.getElementById('loginPanel').style.display='none';
        document.getElementById('mainContent').style.display='block';
        animateHero();
        showStartButton();
        alert(`Welcome, ${username}! Scroll down and click Start Game to play.`);
    } else {
        alert('Please enter your name');
    }
}

// Animate hero and title
function animateHero(){
    gsap.to("#heroSection",{opacity:1,duration:1});
    gsap.from("#heroSection h1",{opacity:0,y:-50,duration:1});
    gsap.from("#heroSection p",{opacity:0,y:50,duration:1,delay:0.5});
    gsap.from("#heroSection button",{opacity:0,y:30,duration:1,delay:1});
}

// Generate 20+ cards dynamically for mega page
const modelsContainer = document.getElementById('modelsContainer');
const carNames = ["M3","M4","M5","M6","X5 M","X6 M","Z4","i4","iX","M8","i7","M2","M760","M135","X3 M","X4 M","X7 M","iX1","iX3","M550"];
for(let i=0;i<carNames.length;i++){
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `<img src='https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg'><h3>${carNames[i]}</h3><div class="card-overlay"></div>`;
    card.onclick = function(){openStory(carNames[i]);};
    modelsContainer.appendChild(card);
}

// Story panel dynamic content
function openStory(car){
    let storyPanel = document.querySelector('.story-panel');
    if(!storyPanel){
        storyPanel = document.createElement('div');
        storyPanel.className='story-panel';
        document.body.appendChild(storyPanel);
    }
    storyPanel.innerHTML=`<h2>${car} Details</h2>
    <img src='https://images.pexels.com/photos/1149831/pexels-photo-1149831.jpeg'>
    <p>Explore the ${car} with full specs, interior options, and driving dynamics.</p>
    <button onclick="this.parentElement.classList.remove('active')">Close</button>
    <button onclick="alert('Customize ${car} coming soon!')">Customize</button>`;
    storyPanel.classList.add('active');
    gsap.from(".story-panel",{opacity:0,scale:0.5,duration:0.7});
}

// Show start game button after scroll
function showStartButton(){
    const btn = document.getElementById('startGameBtn');
    gsap.to(btn,{opacity:1,duration:1,delay:2});
}

// Start game panel
function startGame(){
    const gamePanel = document.getElementById('gamePanel');
    gamePanel.style.display='block';
    gsap.from(gamePanel,{opacity:0,y:50,duration:1});
    const coinsDisplay = document.getElementById('coinsDisplay');
    coinsDisplay.style.display='block';
}

// Footer animation on scroll
window.addEventListener('scroll',function(){
    const footer = document.querySelector('footer');
    if(window.scrollY+window.innerHeight > footer.offsetTop){
        gsap.to(footer,{opacity:1,duration:1});
    }
});
</script>

</body>
</html>
